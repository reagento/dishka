version: 2

build:
  os: "ubuntu-24.04"
  tools:
    python: "3.14"
  commands:
    - uv venv $READTHEDOCS_VIRTUALENV_PATH
    - uv pip install -r requirements_doc.txt
    - uv pip install .
    - python -m sphinx -T -b html -d _build/doctrees -D language=en docs/ $READTHEDOCS_OUTPUT/html

sphinx:
  configuration: docs/conf.py
