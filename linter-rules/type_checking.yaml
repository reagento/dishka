id: DISHKA001
language: python
message: "Do not use `typing.TYPE_CHECKING`"
note: |
  `typing.TYPE_CHECKING` causes different behavior in type checking and at runtime,
  which can failures in runtime.
severity: error
files: [
    "src/*.py",
    "tests/*.py",
    "examples/*.py",
]
ignores: [
    "src/dishka/_adaptix/**.py",
]
rule:
  any:
    - pattern: typing.TYPE_CHECKING
      kind: attribute
    - pattern: TYPE_CHECKING
      kind: identifier
      not:
        any:
          - inside:
              kind: import_from_statement
          - inside:
              kind: aliased_import
          - inside:
              kind: import_statement
          - inside:
              kind: as_pattern
          - inside:
              kind: dotted_name
          - inside:
              kind: assignment
              pattern: TYPE_CHECKING = $_
    - pattern: $ALIAS
      kind: identifier
      inside:
        kind: module
        has:
          pattern: from typing import TYPE_CHECKING as $ALIAS
          kind: import_from_statement
        not:
          any:
            - inside:
                kind: import_from_statement
            - inside:
                kind: aliased_import
            - inside:
                kind: import_statement
            - inside:
                kind: as_pattern
            - inside:
                kind: dotted_name
            - inside:
                kind: assignment
                pattern: $ALIAS = $_
