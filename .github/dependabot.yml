version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    target-branch: develop
    cooldown:
      default-days: 4

  - package-ecosystem: "pip"
    directory: "/"
    file: "requirements_dev.txt"
    schedule:
      interval: "weekly"
    target-branch: develop
    cooldown:
      default-days: 4
    groups:
      python-packages:
        patterns:
          - "*"